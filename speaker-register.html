<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speaker Registration | EventSpeak</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-gray-800 scroll-smooth">

<!-- NAVBAR -->
<header class="bg-white shadow fixed w-full z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

    <!-- LOGO -->
    <a href="index.html" class="text-2xl font-bold text-indigo-600 hover:opacity-80 transition">
      EventSpeak
    </a>

    <nav class="hidden md:flex gap-8 font-medium text-gray-600 items-center">
      <a href="#" class="hover:text-indigo-600">Kategori</a>
      <a href="speaker-register.html" class="text-indigo-600 font-semibold">Menjadi Pemateri</a>
      <a href="team.html" class="hover:text-indigo-600">Team</a>
      <a href="index.html#contact" class="hover:text-indigo-600">Contact</a>

      <!-- LOGIN -->
      <a href="login.html"
        class="ml-4 px-5 py-2 rounded-lg bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold shadow-lg hover:scale-105 transition">
        Login
      </a>
    </nav>

    <button id="menu-btn" class="md:hidden text-xl">☰</button>
  </div>

  <!-- MOBILE -->
  <div id="mobile-menu" class="hidden md:hidden px-6 pb-6 space-y-3 bg-white">
    <a href="index.html">Home</a>
    <a href="#">Kategori</a>
    <a href="speaker-register.html">Pemateri</a>
    <a href="team.html">Team</a>
    <a href="index.html#contact">Contact</a>

    <a href="login.html"
      class="block text-center bg-indigo-600 text-white py-2 rounded-lg mt-2">
      Login
    </a>
  </div>
</header>

<!-- FORM -->
<section class="min-h-screen flex items-center justify-center px-6 py-32">
  <div class="w-full max-w-xl bg-white p-10 rounded-2xl shadow-lg">

    <h2 class="text-3xl font-bold mb-6 text-center">
      Speaker Registration
    </h2>

    <form class="space-y-5">

      <div>
        <label class="block mb-1">Full Name</label>
        <input type="text" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <div>
        <label class="block mb-1">Email</label>
        <input type="email" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <div>
        <label class="block mb-1">LinkedIn</label>
        <input type="url" placeholder="https://linkedin.com/in/username"
          class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <div>
        <label class="block mb-1">Area of Expertise</label>
        <input type="text" class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <div>
        <label class="block mb-1">Jenis Event</label>
        <select class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
          <option>Pilih Jenis Event</option>
          <option>Webinar</option>
          <option>Bootcamp</option>
          <option>Workshop</option>
          <option>Seminar</option>
        </select>
      </div>

      <div>
        <label class="block mb-1">Event Topic</label>
        <select class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
          <option>Pilih Topik</option>
          <option>Web Development</option>
          <option>UI/UX Design</option>
          <option>Data Science</option>
          <option>Digital Marketing</option>
          <option>Mobile Development</option>
        </select>
      </div>

      <div>
        <label class="block mb-1">Pengalaman Mengajar</label>
        <textarea rows="4"
          class="w-full border p-3 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
      </div>

      <div>
        <label class="block mb-1">Upload Portofolio</label>
        <input type="file"
          class="w-full border p-2 rounded-lg bg-gray-50">
      </div>

      <button
        type="submit"
        class="bg-indigo-600 text-white w-full py-3 rounded-lg hover:bg-indigo-700 hover:scale-105 transition">
        Submit Application
      </button>

    </form>
  </div>
</section>

<!-- FOOTER -->
<footer id="contact" class="bg-gray-900 text-gray-400 py-12">
  <div class="max-w-6xl mx-auto px-6 text-center">
    <h2 class="text-white text-xl font-bold mb-3">EventSpeak</h2>
    <p>Platform webinar & bootcamp terintegrasi.</p>
    <p class="mt-6 text-sm">© 2026 EventSpeak</p>
  </div>
</footer>

<script>
const btn = document.getElementById("menu-btn");
const menu = document.getElementById("mobile-menu");

btn.addEventListener("click", () => {
  menu.classList.toggle("hidden");
});
</script>

</body>
</html>
