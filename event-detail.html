<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Event Detail | EventSpeak</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-gray-800">

<!-- HEADER -->
<header class="bg-white shadow fixed w-full z-50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

    <a href="index.html" class="text-2xl font-bold text-indigo-600">
      EventSpeak
    </a>

    <nav class="hidden md:flex gap-8 font-medium text-gray-600 items-center">
      <a href="webinar.html" class="text-indigo-600 font-semibold">Webinar</a>
      <a href="bootcamp.html">Bootcamp</a>
      <a href="workshop.html">Workshop</a>
      <a href="index.html#contact">Contact</a>
    </nav>

  </div>
</header>

<!-- CONTENT -->
<section class="pt-32 pb-20 max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-16 items-start">

  <!-- LEFT -->
  <div>

    <span class="bg-indigo-100 text-indigo-600 text-sm px-4 py-2 rounded-full">
      Webinar
    </span>

    <h1 class="text-4xl font-bold mt-6 mb-4 leading-snug">
      AI for Beginners
    </h1>

    <p class="text-gray-600 mb-6">
      Pelajari dasar-dasar Artificial Intelligence, mulai dari konsep,
      penerapan, hingga peluang karir di bidang AI.
    </p>

    <img src="dist/img/web.jpg"
         class="w-full rounded-xl shadow mb-6">

    <button class="bg-indigo-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">
      Daftar Sekarang
    </button>

  </div>

  <!-- RIGHT -->
  <div class="bg-white p-8 rounded-xl shadow space-y-6">

    <div>
      <p class="text-gray-500">Speaker</p>
      <h3 class="font-semibold text-lg">
        John Doe
      </h3>
    </div>

    <hr>

    <div>
      <p class="text-gray-500">Hari/Tanggal</p>
      <p>Sabtu, 10 Mei 2026</p>
    </div>

    <div>
      <p class="text-gray-500">Waktu</p>
      <p>19.00 WIB</p>
    </div>

    <div>
      <p class="text-gray-500">Via</p>
      <p>Zoom</p>
    </div>

    <hr>

    <div>
      <p class="text-gray-500 mb-2">Share</p>
      <div class="flex gap-3">
        <div class="bg-gray-100 px-4 py-2 rounded-lg">Facebook</div>
        <div class="bg-gray-100 px-4 py-2 rounded-lg">Twitter</div>
        <div class="bg-gray-100 px-4 py-2 rounded-lg">LinkedIn</div>
      </div>
    </div>

  </div>

</section>

</body>
</html>
