<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | EventSpeak</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 flex items-center justify-center min-h-screen">

  <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">

    <h2 class="text-2xl font-bold text-center text-indigo-600 mb-6">
      Daftar EventSpeak
    </h2>

    <form class="space-y-4">

      <!-- NAMA -->
      <input type="text" placeholder="Nama Lengkap"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">

      <!-- EMAIL -->
      <input type="email" placeholder="Email"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">

      <!-- PASSWORD -->
      <input type="password" placeholder="Password"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">

      <!-- KONFIRMASI PASSWORD -->
      <input type="password" placeholder="Konfirmasi Password"
        class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">

      <!-- REGISTER BUTTON -->
      <button
        type="submit"
        class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition">
        Daftar
      </button>

    </form>

    <!-- OR DIVIDER -->
    <div class="flex items-center my-6">
      <hr class="flex-1 border-gray-300">
      <span class="px-3 text-gray-500 text-sm">atau</span>
      <hr class="flex-1 border-gray-300">
    </div>

    <!-- GOOGLE REGISTER -->
    <button
      class="w-full flex items-center justify-center gap-3 border py-3 rounded-lg hover:bg-gray-100 transition">

      <img src="https://www.svgrepo.com/show/475656/google-color.svg"
           class="w-5 h-5">

      <span class="font-medium text-gray-700">
        Daftar dengan Google
      </span>
    </button>

    <!-- LOGIN LINK -->
    <p class="text-center text-sm mt-4">
      Sudah punya akun?
      <a href="login.html" class="text-indigo-600 font-semibold">Login</a>
    </p>

  </div>

</body>
</html>
